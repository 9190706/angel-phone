<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Angel Phone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="phone-screen" id="phone-screen">

    <!-- 状态栏：时间会自动走，图标是纯装饰SVG -->
    <div class="status-bar">
      <span class="status-time" id="status-time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 20 12" class="icon-signal" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/>
          <rect x="5" y="5" width="3" height="7" rx="1" fill="currentColor"/>
          <rect x="10" y="3" width="3" height="9" rx="1" fill="currentColor"/>
          <rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor"/>
        </svg>
        <svg viewBox="0 0 18 13" class="icon-wifi" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 11.5C9.55 11.5 10 11.05 10 10.5C10 9.95 9.55 9.5 9 9.5C8.45 9.5 8 9.95 8 10.5C8 11.05 8.45 11.5 9 11.5Z" fill="currentColor"/>
          <path d="M5.5 7.8C6.4 7 7.65 6.5 9 6.5C10.35 6.5 11.6 7 12.5 7.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M2.5 4.6C4.3 3 6.55 2 9 2C11.45 2 13.7 3 15.5 4.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <svg viewBox="0 0 25 12" class="icon-battery" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="currentColor"/>
          <rect x="2" y="2" width="18" height="8" rx="1.3" fill="currentColor"/>
          <rect x="22.5" y="4" width="2" height="4" rx="1" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- 所有页面都在这个容器里切换 -->
    <div class="screen-container" id="screen-container">

      <!-- 主屏幕 -->
      <div class="screen screen-home active" data-screen="home">
        <div class="home-clock">
          <div class="home-time" id="home-time">9:41</div>
          <div class="home-date" id="home-date">星期日 · 7月12日</div>
        </div>

        <div class="app-grid">
          <button class="app-icon" data-open="chat">
            <span class="icon-squircle">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 5.5C4 4.67157 4.67157 4 5.5 4H18.5C19.3284 4 20 4.67157 20 5.5V15.5C20 16.3284 19.3284 17 18.5 17H9L5.5 20V17H5.5C4.67157 17 4 16.3284 4 15.5V5.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="app-label">Chat</span>
          </button>

          <button class="app-icon" data-open="settings">
            <span class="icon-squircle">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 15.5C13.933 15.5 15.5 13.933 15.5 12C15.5 10.067 13.933 8.5 12 8.5C10.067 8.5 8.5 10.067 8.5 12C8.5 13.933 10.067 15.5 12 15.5Z" stroke="currentColor" stroke-width="1.5"/>
                <path d="M19.4 13.5C19.5 12.85 19.5 12.15 19.4 11.5L21 10.2L19.5 7.6L17.6 8.3C17.1 7.85 16.5 7.5 15.9 7.25L15.6 5.2H12.4L12.1 7.25C11.5 7.5 10.9 7.85 10.4 8.3L8.5 7.6L7 10.2L8.6 11.5C8.5 12.15 8.5 12.85 8.6 13.5L7 14.8L8.5 17.4L10.4 16.7C10.9 17.15 11.5 17.5 12.1 17.75L12.4 19.8H15.6L15.9 17.75C16.5 17.5 17.1 17.15 17.6 16.7L19.5 17.4L21 14.8L19.4 13.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="app-label">设置</span>
          </button>
        </div>
      </div>

      <!-- Chat 占位页（下一步会替换成真正的 Chat 引导流程） -->
      <div class="screen app-view" data-screen="chat">
        <div class="app-header">
          <button class="btn-back" data-action="go-home">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="app-title">Chat</span>
          <span class="header-spacer"></span>
        </div>
        <div class="placeholder-body">
          <p>Chat 模块将在下一步开发</p>
        </div>
      </div>

      <!-- 设置 占位页 -->
      <div class="screen app-view" data-screen="settings">
        <div class="app-header">
          <button class="btn-back" data-action="go-home">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="app-title">设置</span>
          <span class="header-spacer"></span>
        </div>
        <div class="placeholder-body">
          <p>设置模块将在后续开发</p>
        </div>
      </div>

    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
