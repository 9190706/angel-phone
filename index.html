<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Angel Phone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="phone-screen" id="phone-screen">

    <!-- 状态栏 -->
    <div class="status-bar">
      <span class="status-time" id="status-time">9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 20 12" class="icon-signal" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/>
          <rect x="5" y="5" width="3" height="7" rx="1" fill="currentColor"/>
          <rect x="10" y="3" width="3" height="9" rx="1" fill="currentColor"/>
          <rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor"/>
        </svg>
        <svg viewBox="0 0 18 13" class="icon-wifi" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 11.5C9.55 11.5 10 11.05 10 10.5C10 9.95 9.55 9.5 9 9.5C8.45 9.5 8 9.95 8 10.5C8 11.05 8.45 11.5 9 11.5Z" fill="currentColor"/>
          <path d="M5.5 7.8C6.4 7 7.65 6.5 9 6.5C10.35 6.5 11.6 7 12.5 7.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M2.5 4.6C4.3 3 6.55 2 9 2C11.45 2 13.7 3 15.5 4.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <svg viewBox="0 0 25 12" class="icon-battery" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="currentColor"/>
          <rect x="2" y="2" width="18" height="8" rx="1.3" fill="currentColor"/>
          <rect x="22.5" y="4" width="2" height="4" rx="1" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- 所有页面都在这个容器里切换 -->
    <div class="screen-container" id="screen-container">

      <!-- 主屏幕 -->
      <div class="screen screen-home active" data-screen="home">
        <div class="home-clock">
          <div class="home-time" id="home-time">9:41</div>
          <div class="home-date" id="home-date">星期日 · 7月12日</div>
        </div>

        <div class="app-grid">
          <button class="app-icon" data-open="chat">
            <span class="icon-squircle">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 5.5C4 4.67157 4.67157 4 5.5 4H18.5C19.3284 4 20 4.67157 20 5.5V15.5C20 16.3284 19.3284 17 18.5 17H9L5.5 20V17H5.5C4.67157 17 4 16.3284 4 15.5V5.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="app-label">Chat</span>
          </button>

          <button class="app-icon" data-open="settings">
            <span class="icon-squircle">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 15.5C13.933 15.5 15.5 13.933 15.5 12C15.5 10.067 13.933 8.5 12 8.5C10.067 8.5 8.5 10.067 8.5 12C8.5 13.933 10.067 15.5 12 15.5Z" stroke="currentColor" stroke-width="1.5"/>
                <path d="M19.4 13.5C19.5 12.85 19.5 12.15 19.4 11.5L21 10.2L19.5 7.6L17.6 8.3C17.1 7.85 16.5 7.5 15.9 7.25L15.6 5.2H12.4L12.1 7.25C11.5 7.5 10.9 7.85 10.4 8.3L8.5 7.6L7 10.2L8.6 11.5C8.5 12.15 8.5 12.85 8.6 13.5L7 14.8L8.5 17.4L10.4 16.7C10.9 17.15 11.5 17.5 12.1 17.75L12.4 19.8H15.6L15.9 17.75C16.5 17.5 17.1 17.15 17.6 16.7L19.5 17.4L21 14.8L19.4 13.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="app-label">设置</span>
          </button>
        </div>
      </div>

      <!-- ============ Chat App ============ -->
      <div class="screen app-view" data-screen="chat" id="screen-chat">

        <!-- 引导：创建 User -->
        <div class="chat-sub active" data-chat-view="onboarding-user">
          <div class="app-header">
            <button class="btn-back" data-action="go-home">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <span class="app-title">Chat</span>
            <span class="header-spacer"></span>
          </div>
          <div class="onboarding-body">
            <div class="onboarding-avatar-wrap">
              <div class="avatar-circle avatar-lg" id="user-avatar-preview">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8.5" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 19C5.8 15.8 8.2 14 12 14C15.8 14 18.2 15.8 19 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              </div>
              <label class="btn-edit-avatar">
                更换头像
                <input type="file" accept="image/*" id="user-avatar-input" hidden>
              </label>
            </div>
            <p class="onboarding-hint">欢迎使用 Chat，先创建你的 User 身份</p>
            <input type="text" class="onboarding-input" id="user-name-input" placeholder="给自己起个名字" maxlength="20">
            <button class="btn-primary" id="btn-create-user">创建 User</button>
          </div>
        </div>

        <!-- 引导：创建 Character -->
        <div class="chat-sub" data-chat-view="onboarding-character">
          <div class="app-header">
            <button class="btn-back" data-action="go-home">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <span class="app-title">Chat</span>
            <span class="header-spacer"></span>
          </div>
          <div class="onboarding-body">
            <div class="onboarding-avatar-wrap">
              <div class="avatar-circle avatar-lg" id="character-avatar-preview">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8.5" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 19C5.8 15.8 8.2 14 12 14C15.8 14 18.2 15.8 19 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              </div>
              <label class="btn-edit-avatar">
                更换头像
                <input type="file" accept="image/*" id="character-avatar-input" hidden>
              </label>
            </div>
            <p class="onboarding-hint">再创建一个 Character（聊天对象）</p>
            <input type="text" class="onboarding-input" id="character-name-input" placeholder="给角色起个名字" maxlength="20">
            <button class="btn-primary" id="btn-create-character">创建 Character</button>
          </div>
        </div>

        <!-- 主界面：联系人 / 添加 / 朋友圈 / 主页 -->
        <div class="chat-sub" data-chat-view="main">

          <div class="chat-tab-content active" data-tab="contacts">
            <div class="app-header">
              <span class="app-title">联系人</span>
              <div class="header-actions">
                <button class="icon-btn" title="搜索">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.6"/><path d="M20 20L16 16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                </button>
                <button class="icon-btn" id="btn-add-shortcut" title="添加">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
                </button>
              </div>
            </div>
            <div class="contacts-scroll" id="contacts-list"></div>
          </div>

          <div class="chat-tab-content" data-tab="add">
            <div class="app-header"><span class="app-title">添加</span></div>
            <div class="tab-body">
              <button class="action-row" id="btn-add-character">
                <span class="avatar-circle avatar-sm">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                </span>
                <span>创建新 Character</span>
              </button>
              <button class="action-row" disabled>
                <span class="avatar-circle avatar-sm">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="9" r="2.6" stroke="currentColor" stroke-width="1.4"/><circle cx="16" cy="9" r="2.6" stroke="currentColor" stroke-width="1.4"/><path d="M3 19c.6-2.6 2.6-4 5-4s4.4 1.4 5 4M13 19c.5-2.2 2.1-3.6 4-3.9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                </span>
                <span>创建群组（即将推出）</span>
              </button>
            </div>
          </div>

          <div class="chat-tab-content" data-tab="moments">
            <div class="app-header"><span class="app-title">朋友圈</span></div>
            <div class="placeholder-body"><p>朋友圈模块将在后续开发</p></div>
          </div>

          <div class="chat-tab-content" data-tab="profile">
            <div class="app-header"><span class="app-title">主页</span></div>
            <div class="profile-body">
              <div class="avatar-circle avatar-lg" id="profile-avatar"></div>
              <div class="profile-name" id="profile-name">User</div>
            </div>
          </div>

          <div class="chat-bottom-nav">
            <button class="nav-item active" data-chat-tab="contacts">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6.5C4 5.67157 4.67157 5 5.5 5H18.5C19.3284 5 20 5.67157 20 6.5V15.5C20 16.3284 19.3284 17 18.5 17H9L5.5 20V17H5.5C4.67157 17 4 16.3284 4 15.5V6.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
              <span>联系人</span>
            </button>
            <button class="nav-item" data-chat-tab="add">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M12 8.5V15.5M8.5 12H15.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <span>添加</span>
            </button>
            <button class="nav-item" data-chat-tab="moments">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2.2" stroke="currentColor" stroke-width="1.3"/></svg>
              <span>朋友圈</span>
            </button>
            <button class="nav-item" data-chat-tab="profile">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8.5" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 19C5.8 15.8 8.2 14 12 14C15.8 14 18.2 15.8 19 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <span>主页</span>
            </button>
          </div>

        </div>

      </div>

      <!-- 设置 占位页 -->
      <div class="screen app-view" data-screen="settings">
        <div class="app-header">
          <button class="btn-back" data-action="go-home">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <span class="app-title">设置</span>
          <span class="header-spacer"></span>
        </div>
        <div class="placeholder-body"><p>设置模块将在后续开发</p></div>
      </div>

    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
