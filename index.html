<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Angel Phone</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="phone-screen">


<!-- ================= 状态栏 ================= -->

<div class="status-bar">

<span id="status-time">
23:59
</span>


<div class="status-icons">

<svg viewBox="0 0 24 12">
<rect x="1" y="7" width="3" height="5"/>
<rect x="6" y="5" width="3" height="7"/>
<rect x="11" y="3" width="3" height="9"/>
<rect x="16" y="1" width="3" height="11"/>
</svg>


<svg viewBox="0 0 24 16">
<path d="M2 5C8-1 16-1 22 5"/>
<path d="M6 9C10 5 14 5 18 9"/>
<circle cx="12" cy="13" r="1"/>
</svg>


<svg viewBox="0 0 28 14">
<rect x="1" y="1" width="22" height="12" rx="3"/>
<rect x="3" y="3" width="18" height="8" rx="2"/>
<rect x="24" y="5" width="3" height="4"/>
</svg>


</div>

</div>





<!-- ================= 页面容器 ================= -->

<div class="screen-container">





<!-- ================= HOME ================= -->


<section class="screen active" data-screen="home">


<div class="home-clock">

<div id="home-time">
23:59
</div>


<div id="home-date">
星期日 · 7月12日
</div>

</div>




<div class="app-grid">


<button class="app-icon" data-open="chat">


<div class="icon-box">


<svg viewBox="0 0 24 24">

<path d="M4 5.5C4 4.7 4.7 4 5.5 4h13c.8 0 1.5.7 1.5 1.5v9c0 .8-.7 1.5-1.5 1.5H9l-5 4v-4.5c0-.8 0-1.5 0-1.5z"/>

</svg>


</div>


<span>
Chat
</span>


</button>





<button class="app-icon" data-open="settings">


<div class="icon-box">

<svg viewBox="0 0 24 24">

<circle cx="12" cy="12" r="3"/>

<path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.4 3.1a7 7 0 0 0-1.7 1l-2.3-1-2 3.4L5 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.4 3.1h5l.4-3.1a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5a7 7 0 0 0 .2-1z"/>

</svg>

</div>


<span>
设置
</span>


</button>


</div>


</section>





<!-- ================= CHAT APP ================= -->


<section class="screen app-screen" data-screen="chat">



<!-- CHAT 首页 -->


<div class="chat-home">



<header class="chat-header">


<h2>
Chat
</h2>


<button id="chat-add">

<svg viewBox="0 0 24 24">

<path d="M12 5v14M5 12h14"/>

</svg>

</button>


</header>




<div class="profile-card">


<div class="avatar">


<svg viewBox="0 0 24 24">

<circle cx="12" cy="8" r="3"/>

<path d="M5 19c1-3 3-5 7-5s6 2 7 5"/>

</svg>


</div>


<div>


<h3>
Angel
</h3>

<p>
一颗心，半滴泪。
</p>


</div>


</div>



<div id="contact-list">

</div>



</div>
